backend:
  name: github
  repo: chovex777-tech/Pozo-Santo
  branch: main
  site_domain: "pozo-santo.netlify.app"

media_folder: "images/uploads"
public_folder: "/images/uploads"

collections:
  - name: "historia"
    label: "Historia de Pozo Santo"
    files:
      - name: "contenido"
        label: "Contenido de la página"
        file: "contenido/historia.yml"
        fields:
          - label: "Header - Subtítulo"
            name: "header_subtitulo"
            widget: "object"
            fields:
              - { label: "Español", name: "es", widget: "string", default: "DESDE 1888" }
              - { label: "English", name: "en", widget: "string", default: "SINCE 1888" }
          
          - label: "Header - Texto"
            name: "header_texto"
            widget: "object"
            fields:
              - { label: "Español", name: "es", widget: "text", default: "Seis generaciones de maestros tequileros..." }
              - { label: "English", name: "en", widget: "text", default: "Six generations of master distillers..." }
          
          - label: "Título principal"
            name: "titulo"
            widget: "object"
            fields:
              - { label: "Español", name: "es", widget: "string", default: "EL DESCUBRIMIENTO DEL POZO SAGRADO" }
              - { label: "English", name: "en", widget: "string", default: "THE DISCOVERY OF THE SACRED WELL" }
          
          - label: "Texto de la leyenda"
            name: "texto"
            widget: "object"
            fields:
              - { label: "Español", name: "es", widget: "text", default: "Corría el año 1888..." }
              - { label: "English", name: "en", widget: "text", default: "It was the year 1888..." }
          
          - label: "Cita famosa"
            name: "cita"
            widget: "object"
            fields:
              - { label: "Español", name: "es", widget: "text", default: "Esta agua tiene un sabor distinto..." }
              - { label: "English", name: "en", widget: "text", default: "This water has a distinct taste..." }
